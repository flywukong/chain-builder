<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbital Core — Validator Ring</title>
<style>
:root{
  --bg:#0A0908; --border:#242220; --gold:#F0B90B; --text:#E8E4DA; --muted:#6B6862;
  --mono:'SF Mono','Fira Code','Consolas',monospace;
  --sans:-apple-system,'Helvetica Neue',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:radial-gradient(900px 500px at 50% -5%,#16130d 0%,transparent 55%),var(--bg);
  color:var(--text);font-family:var(--sans);font-size:13px;line-height:1.55;
  padding:36px 28px 60px;max-width:1000px;margin:0 auto;
}
.head{border-bottom:1px solid var(--border);padding-bottom:18px;margin-bottom:24px;}
.head h1{font-size:19px;font-weight:700;}
.head .gold{color:var(--gold);}
.head p{font-size:11px;color:var(--muted);margin-top:5px;max-width:620px;}
.stage{
  background:radial-gradient(640px 380px at 50% 44%,#15120c 0%,transparent 60%),
    linear-gradient(180deg,#0d0c0b 0%,#080706 100%);
  border:1px solid var(--border);border-radius:16px;padding:8px;position:relative;overflow:hidden;
}
.stage::before{
  content:'';position:absolute;inset:0;
  background-image:linear-gradient(#ffffff05 1px,transparent 1px),linear-gradient(90deg,#ffffff05 1px,transparent 1px);
  background-size:34px 34px;
  -webkit-mask-image:radial-gradient(520px 320px at 50% 46%,#000 0%,transparent 76%);
  mask-image:radial-gradient(520px 320px at 50% 46%,#000 0%,transparent 76%);
  pointer-events:none;
}
canvas{display:block;width:100%;max-width:100%;aspect-ratio:760/470;height:auto;position:relative;}
.legend{display:flex;flex-wrap:wrap;gap:8px 18px;margin-top:16px;padding:0 4px;}
.lg{display:flex;align-items:center;gap:7px;font-size:10px;color:#9a958c;}
.lg .orb{width:13px;height:13px;border-radius:50%;flex-shrink:0;}
.note{font-size:10px;color:#4a4843;margin-top:14px;font-family:var(--mono);}
</style>
</head>
<body>
<div class="head">
  <h1><span class="gold">Orbital Core</span> · Validator Ring</h1>
  <p>3D 球体节点 + 集团配色。同一集团的 validator 共用一种颜色，球体带高光/明暗/边缘光，景深前大后小。proposer 白热发光，光束连向中心能量核。分组为 mock，待替换真实数据。</p>
</div>
<div class="stage"><canvas id="ring"></canvas></div>
<div class="legend" id="legend"></div>
<div class="note">// 3D specular 球体 · 集团色编码 · 景深排序 · proposer→core 能量光束 · slash 状态用红/橙边环叠加</div>

<script>
const REDUCED=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const W=760,H=470;

// ── Validator groups (MOCK — 待替换真实集团数据) ──
const GROUPS={
  avengers:{name:'Avengers',  color:'#E8B339'},
  fuji:    {name:'Fuji 系',    color:'#3FB8A0'},
  legend:  {name:'Legend 系',  color:'#9A86F0'},
  exchange:{name:'Exchanges',  color:'#EC6A82'},
  infra:   {name:'Infra',      color:'#5AA6E0'},
  stake:   {name:'Staking',    color:'#B6CC52'},
};
// name, group, state
const VALS=[
  ['Avengers','avengers','ok'], ['BNB48','avengers','ok'], ['Figment','avengers','ok'], ['Pexmons','avengers','ok'],
  ['Fuji','fuji','ok'], ['MathW','fuji','ok'], ['Defibit','fuji','ok'], ['NodeReal','fuji','warn'], ['Tranchess','fuji','ok'],
  ['Legend','legend','ok'], ['Velvet','legend','ok'], ['Ciscox','legend','felony'],
  ['Binance','exchange','ok'], ['OKX','exchange','ok'], ['Coinbase','exchange','ok'],
  ['Ankr','infra','ok'], ['InfStone','infra','ok'], ['Everstake','infra','ok'],
  ['TWStake','stake','ok'], ['Stakec','stake','ok'], ['HashKey','stake','ok'],
];
const N=VALS.length;

// color utils
function hx(c){return {r:parseInt(c.slice(1,3),16),g:parseInt(c.slice(3,5),16),b:parseInt(c.slice(5,7),16)};}
function rgba(o,a){return `rgba(${o.r|0},${o.g|0},${o.b|0},${a})`;}
function sc(o,f){return {r:Math.min(255,o.r*f),g:Math.min(255,o.g*f),b:Math.min(255,o.b*f)};}

const cv=document.getElementById('ring');
const dpr=Math.min(window.devicePixelRatio||1,2);
cv.width=W*dpr; cv.height=H*dpr;
const ctx=cv.getContext('2d'); ctx.scale(dpr,dpr);

const cx=W/2, cy=H*0.46, R=176, TILT=0.5;
let cur=0,lastHop=0,rot=0; const HOP=104;
let trail=[];
const dust=Array.from({length:30},(_,i)=>({a:(i/30)*Math.PI*2,r:70+Math.random()*180,sp:0.0005+Math.random()*0.0009,s:Math.random()*1.5+0.3}));

function base(i){return i*(Math.PI*2/N)-Math.PI/2;}
function pos(ang){return {x:cx+R*Math.cos(ang),y:cy+R*Math.sin(ang)*TILT,d:Math.sin(ang)};}

function drawBg(){
  const g=ctx.createRadialGradient(cx,cy,40,cx,cy,440);
  g.addColorStop(0,'#14110b');g.addColorStop(0.55,'#0b0a08');g.addColorStop(1,'#070605');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
}

// 3D glossy sphere
function orb(x,y,r,baseHex,alpha,active){
  const base=hx(baseHex);
  // soft group glow
  ctx.shadowColor=rgba(base, active?0.9:0.45); ctx.shadowBlur=active?22:Math.max(0,r*1.4);
  const g=ctx.createRadialGradient(x-r*0.4,y-r*0.45,r*0.05,x,y,r*1.08);
  g.addColorStop(0, active?'rgba(255,250,235,'+alpha+')':rgba(sc(base,1.75),alpha));
  g.addColorStop(0.4, rgba(active?sc(base,1.5):base,alpha));
  g.addColorStop(1, rgba(sc(base,0.32),alpha));
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill();
  ctx.shadowBlur=0;
  // rim light (bottom-right crescent)
  ctx.beginPath(); ctx.arc(x,y,r,0.25,1.45);
  ctx.strokeStyle=rgba(sc(base,1.9),alpha*0.55); ctx.lineWidth=Math.max(1,r*0.13); ctx.stroke();
  // specular highlight
  ctx.beginPath(); ctx.arc(x-r*0.34,y-r*0.4,r*0.26,0,7);
  ctx.fillStyle='rgba(255,255,255,'+(alpha*0.7)+')'; ctx.fill();
}

function buildLegend(){
  const el=document.getElementById('legend');
  Object.values(GROUPS).forEach(g=>{
    const d=document.createElement('div'); d.className='lg';
    const base=hx(g.color);
    d.innerHTML='<span class="orb" style="background:radial-gradient(circle at 35% 30%,'+rgba(sc(base,1.7),1)+','+g.color+' 55%,'+rgba(sc(base,0.4),1)+')"></span>'+g.name;
    el.appendChild(d);
  });
  const warn=document.createElement('div'); warn.className='lg';
  warn.innerHTML='<span class="orb" style="background:#1a1a1a;border:1.5px solid #F97316"></span>slash warn';
  el.appendChild(warn);
  const fel=document.createElement('div'); fel.className='lg';
  fel.innerHTML='<span class="orb" style="background:#1a1a1a;border:1.5px solid #EF4444"></span>slash felony';
  el.appendChild(fel);
}
buildLegend();

function frame(f){
  drawBg();
  rot+=0.0015;
  if(!REDUCED && f-lastHop>=HOP){cur=(cur+1)%N;lastHop=f;}
  const t=REDUCED?1:Math.min((f-lastHop)/HOP,1);

  // dust
  dust.forEach(p=>{ if(!REDUCED)p.a+=p.sp;
    const x=cx+Math.cos(p.a)*p.r,y=cy+Math.sin(p.a)*p.r*TILT;
    ctx.beginPath();ctx.arc(x,y,p.s,0,7);ctx.fillStyle='rgba(240,185,11,0.09)';ctx.fill();
  });

  // orbit band
  ctx.save();ctx.translate(cx,cy);ctx.scale(1,TILT);
  ctx.beginPath();ctx.arc(0,0,R+22,0,7);ctx.strokeStyle='rgba(240,185,11,0.05)';ctx.lineWidth=1;ctx.stroke();
  ctx.beginPath();ctx.arc(0,0,R,0,7);ctx.strokeStyle='#1d1a14';ctx.lineWidth=11;ctx.stroke();
  ctx.beginPath();ctx.arc(0,0,R,0,7);ctx.strokeStyle='rgba(240,185,11,0.09)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.restore();

  const order=[...Array(N).keys()].sort((a,b)=>pos(base(a)+rot).d-pos(base(b)+rot).d);

  function node(i){
    const [nm,grp,st]=VALS[i];
    const ang=base(i)+rot,p=pos(ang),df=(p.d+1)/2;
    const scl=0.62+df*0.62, alpha=0.4+df*0.6, active=i===cur;
    const gc=GROUPS[grp].color, r=(active?10:7)*scl;

    if(active){
      const pulse=0.5+0.5*Math.sin(f*0.13);
      ctx.beginPath();ctx.arc(p.x,p.y,r+8+pulse*5,0,7);
      ctx.strokeStyle=rgba(hx(gc),0.6);ctx.lineWidth=2;ctx.stroke();
    }
    orb(p.x,p.y,r,gc,alpha,active);

    // slash state rim
    if(st!=='ok'){
      ctx.beginPath();ctx.arc(p.x,p.y,r+3.5,0,7);
      ctx.strokeStyle=st==='felony'?'#EF4444':'#F97316';
      ctx.lineWidth=2; ctx.shadowColor=ctx.strokeStyle; ctx.shadowBlur=10; ctx.stroke(); ctx.shadowBlur=0;
    }

    // label
    const ld=R+(df*10)+22,lx=cx+ld*Math.cos(ang),ly=cy+ld*Math.sin(ang)*TILT+(p.d>0?7:-5);
    ctx.font=active?'700 10px monospace':'8.5px monospace';
    ctx.fillStyle=active?'#FFF6D8':rgba(hx(gc),0.3+df*0.5);
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(nm,lx,ly);
  }

  // back
  order.filter(i=>pos(base(i)+rot).d<0).forEach(node);

  // beam
  const ap=pos(base(cur)+rot), gc=GROUPS[VALS[cur][1]].color, gb=hx(gc);
  const bm=ctx.createLinearGradient(ap.x,ap.y,cx,cy);
  bm.addColorStop(0,rgba(sc(gb,1.4),0.55));bm.addColorStop(1,rgba(gb,0));
  ctx.strokeStyle=bm;ctx.lineWidth=2.4;
  ctx.beginPath();ctx.moveTo(ap.x,ap.y);ctx.lineTo(cx,cy);ctx.stroke();

  // particle + trail
  const pang=base((cur-1+N)%N)+(Math.PI*2/N)*t+rot,pp=pos(pang);
  trail.push({x:pp.x,y:pp.y});if(trail.length>16)trail.shift();
  trail.forEach((tp,idx)=>{const a=idx/trail.length;
    ctx.beginPath();ctx.arc(tp.x,tp.y,a*3,0,7);ctx.fillStyle=rgba(sc(gb,1.4),a*0.5);ctx.fill();});
  ctx.shadowColor=rgba(sc(gb,1.5),1);ctx.shadowBlur=14;
  ctx.beginPath();ctx.arc(pp.x,pp.y,3.4,0,7);ctx.fillStyle='#FFF6D8';ctx.fill();ctx.shadowBlur=0;

  // core
  const cpulse=0.5+0.5*Math.sin(f*0.08);
  const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,52+cpulse*9);
  cg.addColorStop(0,'rgba(255,246,216,0.92)');
  cg.addColorStop(0.22,rgba(sc(gb,1.3),0.45));
  cg.addColorStop(0.6,rgba(gb,0.10));
  cg.addColorStop(1,rgba(gb,0));
  ctx.fillStyle=cg;ctx.beginPath();ctx.arc(cx,cy,52+cpulse*9,0,7);ctx.fill();

  // front
  order.filter(i=>pos(base(i)+rot).d>=0).forEach(node);

  // readout
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='rgba(0,0,0,0.85)';ctx.shadowBlur=7;
  ctx.font='700 23px monospace';ctx.fillStyle='#FFF6D8';
  ctx.fillText('#40,000,'+String(200+Math.floor(f/HOP)%800).padStart(3,'0'),cx,cy-3);
  ctx.shadowBlur=0;
  ctx.font='9px monospace';ctx.fillStyle='#8a857c';ctx.fillText('BLOCK TIME 3.01s',cx,cy+19);
  ctx.font='700 9px monospace';ctx.fillStyle=rgba(sc(gb,1.3),1);
  ctx.fillText('▶ '+VALS[cur][0]+'  ·  '+GROUPS[VALS[cur][1]].name,cx,cy+34);

  // corner HUD
  ctx.textAlign='left';ctx.font='8.5px monospace';ctx.fillStyle='#4a4843';
  ctx.fillText('EPOCH 1842 · TURN '+(cur+1)+'/'+N,18,22);
  ctx.fillStyle='#34D399';ctx.beginPath();ctx.arc(22,H-19,2.4,0,7);ctx.fill();
  ctx.fillStyle='#4a4843';ctx.fillText('LIVE',30,H-17);
}

if(REDUCED){frame(0);}
else{let f=0;(function r(){frame(f++);requestAnimationFrame(r);})();}
</script>
</body>
</html>
